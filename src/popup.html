<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cats &amp; Rats</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header class="bar">
    <div class="brand">
      <img src="icons/icon48.png" width="26" height="26" alt="" />
      <span class="wordmark">Cats <em>&amp;</em> Rats</span>
    </div>
    <div class="bar-tools">
      <button type="button" id="btnTheme" class="icon-btn" title="Switch theme" aria-label="Switch theme">
        <svg class="only-light" width="15" height="15" viewBox="0 0 15 15" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" aria-hidden="true">
          <path d="M12.5 8.6A5.5 5.5 0 0 1 6.4 2.5a5.5 5.5 0 1 0 6.1 6.1Z" />
        </svg>
        <svg class="only-dark" width="15" height="15" viewBox="0 0 15 15" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" aria-hidden="true">
          <circle cx="7.5" cy="7.5" r="3.1" />
          <path d="M7.5 1v1.6M7.5 12.4V14M1 7.5h1.6M12.4 7.5H14M2.9 2.9l1.2 1.2M10.9 10.9l1.2 1.2M12.1 2.9l-1.2 1.2M4.1 10.9l-1.2 1.2" />
        </svg>
      </button>
      <button type="button" id="btnReload" class="icon-btn" title="Rescan page" aria-label="Rescan page">
        <svg width="15" height="15" viewBox="0 0 15 15" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M13 7.5a5.5 5.5 0 1 1-1.6-3.9" />
          <path d="M13 1.5v2.6h-2.6" />
        </svg>
      </button>
    </div>
  </header>

  <div class="controls">
    <label class="field grow">
      <span class="label">Sort</span>
      <select id="sortSel">
        <option value="page">Page order</option>
        <option value="largest">Largest first</option>
        <option value="smallest">Smallest first</option>
        <option value="name">File name</option>
      </select>
    </label>
    <div class="field">
      <span class="label">View</span>
      <div class="seg" role="group" aria-label="Thumbnail size">
        <button type="button" data-cols="1" title="Large thumbnails" aria-pressed="false">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor" aria-hidden="true"><rect x="2" y="2" width="10" height="10" rx="1.5" /></svg>
        </button>
        <button type="button" data-cols="2" title="Medium thumbnails" aria-pressed="false">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor" aria-hidden="true"><rect x="2" y="2" width="4.4" height="4.4" rx="1" /><rect x="7.6" y="2" width="4.4" height="4.4" rx="1" /><rect x="2" y="7.6" width="4.4" height="4.4" rx="1" /><rect x="7.6" y="7.6" width="4.4" height="4.4" rx="1" /></svg>
        </button>
        <button type="button" data-cols="3" title="Small thumbnails" aria-pressed="false">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor" aria-hidden="true"><rect x="1.5" y="1.5" width="3" height="3" rx="0.8" /><rect x="5.5" y="1.5" width="3" height="3" rx="0.8" /><rect x="9.5" y="1.5" width="3" height="3" rx="0.8" /><rect x="1.5" y="5.5" width="3" height="3" rx="0.8" /><rect x="5.5" y="5.5" width="3" height="3" rx="0.8" /><rect x="9.5" y="5.5" width="3" height="3" rx="0.8" /><rect x="1.5" y="9.5" width="3" height="3" rx="0.8" /><rect x="5.5" y="9.5" width="3" height="3" rx="0.8" /><rect x="9.5" y="9.5" width="3" height="3" rx="0.8" /></svg>
        </button>
      </div>
    </div>
    <label class="field">
      <span class="label">Min px</span>
      <input type="number" id="minSize" value="64" min="0" step="8" />
    </label>
  </div>

  <div id="status" class="status">Open a website tab, then press Rescan.</div>

  <main id="grid" class="grid cols-2" aria-live="polite"></main>

  <footer class="foot">
    <span id="count">Nothing selected</span>
    <div class="foot-actions">
      <button type="button" id="btnSelectAll" class="btn ghost">Select all</button>
      <button type="button" id="btnDownload" class="btn primary" disabled>Download</button>
    </div>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
